<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Activation — нет сети</title>
  <meta name="theme-color" content="#0ea5e9">
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #f1f5f9;
      color: #0f172a;
    }
    main {
      max-width: 420px;
      margin: auto;
      text-align: center;
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    p {
      margin-bottom: 2rem;
      color: #475569;
      line-height: 1.5;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 9999px;
      background: #0ea5e9;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem 1.75rem;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.25);
    }
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>Соединение потеряно</h1>
    <p>Попробуйте обновить страницу, когда сеть появится. Ваши ваучеры останутся в безопасности.</p>
    <button type="button" onclick="location.reload()">Повторить попытку</button>
  </main>
</body>
</html>
